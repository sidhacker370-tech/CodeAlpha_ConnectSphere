version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: connectsphere_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password_123
      POSTGRES_DB: connectsphere
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
